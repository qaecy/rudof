name: Publish @qaecy/rudof-linux-x64-musl

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-linux-x64-musl-${{ hashFiles('Cargo.lock') }}
          restore-keys: cargo-linux-x64-musl-

      - name: Cache build artifacts
        uses: actions/cache@v4
        with:
          path: target
          key: target-linux-x64-musl-${{ hashFiles('Cargo.lock') }}
          restore-keys: target-linux-x64-musl-

      - name: Build linux-x64-musl binary inside Alpine container
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -v "$HOME/.cargo/registry:/root/.cargo/registry" \
            -v "$HOME/.cargo/git:/root/.cargo/git" \
            -v "${{ github.workspace }}/target:/workspace/target" \
            -w /workspace/node \
            rust:1-alpine \
            sh -c 'apk add --no-cache nodejs npm musl-dev python3 make g++ git \
              && npm install \
              && ./node_modules/.bin/napi build --platform --release'

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: rudof-linux-x64-musl
          path: node/@qaecy/rudof.linux-x64-musl.node
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Download binary artifact
        uses: actions/download-artifact@v4
        with:
          name: rudof-linux-x64-musl
          path: binary

      - name: Assemble and publish @qaecy/rudof-linux-x64-musl
        run: |
          BINARY="binary/rudof.linux-x64-musl.node"
          VERSION=$(node -e "console.log(require('./node/package.json').version)")
          PKG_DIR="pkg"
          mkdir -p "$PKG_DIR/@qaecy"
          cp "$BINARY" "$PKG_DIR/@qaecy/rudof.linux-x64-musl.node"

          cat > "$PKG_DIR/package.json" << PKGJSON
          {
            "name": "@qaecy/rudof-linux-x64-musl",
            "version": "$VERSION",
            "os": ["linux"],
            "cpu": ["x64"],
            "libc": ["musl"],
            "main": "@qaecy/rudof.linux-x64-musl.node",
            "files": ["@qaecy/rudof.linux-x64-musl.node"],
            "license": "MIT OR Apache-2.0"
          }
          PKGJSON

          cd "$PKG_DIR"
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
