name: Publish @qaecy/rudof-linux-x64-musl

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    container:
      image: rust:1-alpine
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: apk add --no-cache nodejs npm musl-dev python3 make g++ git

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-linux-x64-musl-${{ hashFiles('Cargo.lock') }}
          restore-keys: cargo-linux-x64-musl-

      - name: Cache build artifacts
        uses: actions/cache@v4
        with:
          path: target
          key: target-linux-x64-musl-${{ hashFiles('Cargo.lock') }}
          restore-keys: target-linux-x64-musl-

      - name: Install napi-rs CLI
        working-directory: node
        run: npm install --ignore-scripts

      - name: Build linux-x64-musl binary
        working-directory: node
        run: ./node_modules/.bin/napi build --platform --release

      - name: Prepare npm platform package
        working-directory: node
        run: ./node_modules/.bin/napi prepublish -t npm

      - name: Publish @qaecy/rudof-linux-x64-musl
        working-directory: node/npm/@qaecy/rudof-linux-x64-musl
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
